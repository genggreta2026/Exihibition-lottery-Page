<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAI展会幸运抽奖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"PingFang SC","Microsoft YaHei",sans-serif}
body{
  background: linear-gradient(135deg, #f5f7fa 0%, #e4eaf5 100%);
  padding: 25px 15px;
  min-height: 100vh;
}
.main{
  max-width: 420px;
  margin: 0 auto;
  background:#fff;
  border-radius: 24px;
  padding: 30px 24px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.07);
}
h1{
  text-align:center;
  font-size: 26px;
  font-weight:bold;
  color:#222;
  margin-bottom: 28px;
}

/* 九宫格样式 */
.prize-grid{
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 35px;
}
.prize-item{
  background: #fafbfc;
  border-radius: 16px;
  padding: 12px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.prize-item img{
  width: 100%;
  height: 85px;
  object-fit: contain;
  border-radius: 10px;
  margin-bottom: 8px;
}
.prize-item .txt{
  font-size: 12px;
  color: #333;
  font-weight: 500;
  line-height: 1.3;
}

/* 抽奖按钮 */
.draw-btn{
  width: 100%;
  background: linear-gradient(90deg, #ff3a3a 0%, #ff5e5e 100%);
  color: white;
  border: none;
  border-radius: 50px;
  padding: 18px;
  font-size: 18px;
  font-weight:bold;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(255,58,58,0.25);
  transition: all 0.2s;
}
.draw-btn:active{
  transform: scale(0.97);
}

/* 中奖结果 */
.result{
  text-align:center;
  font-size: 20px;
  font-weight:bold;
  color:#ff3a3a;
  margin-top: 22px;
  line-height:1.5;
  min-height:30px;
}
</style>
</head>

<body>
<div class="main">
  <h1>KAI展会幸运抽奖</h1>

  <!-- 九宫格奖品展示 -->
  <div class="prize-grid">
    <div class="prize-item">
      <img src="https://genggreta2026.github.io/Exihibition-lottery-Page/images/1.jpg">
      <div class="txt">iPhone 17 Pro Max</div>
    </div>
    <div class="prize-item">
      <img src="https://genggreta2026.github.io/Exihibition-lottery-Page/images/2.jpg">
      <div class="txt">500 USAD保证金</div>
    </div>
    <div class="prize-item">
      <img src="https://genggreta2026.github.io/Exihibition-lottery-Page/images/3.jpg">
      <div class="txt">10 USAD保证金</div>
    </div>

    <div class="prize-item">
      <img src="https://genggreta2026.github.io/Exihibition-lottery-Page/images/4.jpg">
      <div class="txt">定制帽子</div>
    </div>
    <div class="prize-item">
      <img src="https://genggreta2026.github.io/Exihibition-lottery-Page/images/5.jpg">
      <div class="txt">品牌T恤</div>
    </div>
    <div class="prize-item">
      <img src="https://genggreta2026.github.io/Exihibition-lottery-Page/images/6.jpg">
      <div class="txt">5 USAD保证金</div>
    </div>

    <div class="prize-item">
      <img src="https://genggreta2026.github.io/Exihibition-lottery-Page/images/7.jpg">
      <div class="txt">1 USAD保证金</div>
    </div>
    <!-- 空格子占位，保持九宫格整齐 -->
    <div class="prize-item"></div>
    <div class="prize-item"></div>
  </div>

  <button class="draw-btn" onclick="startDraw()">开始抽奖</button>
  <div class="result" id="result"></div>
</div>

<script>
// 抽奖逻辑（无限测试版，无限制）
function startDraw() {
  // 奖池已剔除 iPhone
  let prizePool = [
    ...Array(889).fill("七等奖：1 USAD 保证金"),
    ...Array(50).fill("六等奖：5 USAD 保证金"),
    ...Array(20).fill("五等奖：KAI 品牌 T 恤"),
    ...Array(20).fill("四等奖：KAI 品牌定制帽子"),
    ...Array(10).fill("三等奖：10 USAD 保证金"),
    ...Array(10).fill("二等奖：500 USAD 保证金")
  ];

  let winPrize = prizePool[Math.floor(Math.random() * prizePool.length)];
  document.getElementById("result").innerText = "恭喜您中奖：" + winPrize;
}
</script>
</body>
</html>
