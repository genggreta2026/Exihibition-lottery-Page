<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>展会抽奖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
body{background:#f7f8fa;padding:20px}
.main{max-width:420px;margin:0 auto;background:#fff;border-radius:20px;padding:25px;box-shadow:0 0 15px rgba(0,0,0,0.05)}
h1{text-align:center;font-size:22px;margin-bottom:20px;color:#333}
.form-box{margin-bottom:20px}
.form-box input{width:100%;padding:12px 15px;margin:8px 0;border:1px solid #ddd;border-radius:10px;font-size:15px}
.prize-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.prize-item{border:1px solid #eee;border-radius:12px;padding:10px;text-align:center}
.prize-item img{width:100%;height:100px;object-fit:contain;border-radius:8px}
.prize-item p{margin-top:5px;font-size:14px;color:#666}
.draw-btn{width:100%;background:#ff3a3a;color:white;border:none;border-radius:30px;padding:15px;font-size:16px;font-weight:bold;cursor:pointer}
.draw-btn:disabled{background:#ccc}
.result{text-align:center;font-size:18px;font-weight:bold;color:#ff3a3a;margin-top:15px}
</style>
</head>
<body>
<div class="main">
  <h1>KAI展会幸运抽奖</h1>

<form action="/submit" method="POST">
  <div class="form-box">
    <input type="text" id="name" name="name" placeholder="请输入姓名">
    <input type="tel" id="phone" name="phone" placeholder="请输入11位手机号">
    <input type="email" id="email" name="email" placeholder="请输入邮箱">
 
    <input type="hidden" id="prizeResult" name="prize" value="">
  </div>
</form>



<style>
.swipe-container {
  max-width: 360px;
  margin: 30px auto;
  text-align: center;
  user-select: none;
}
.swipe-wrapper {
  position: relative;
  overflow: hidden;
  border-radius: 20px;
  border: 2px solid #eee;
  background: #fff;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}
.swipe-slide {
  display: flex;
  transition: transform 0.35s ease;
}
.swipe-item {
  min-width: 100%;
  padding: 30px 20px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 15px;
}
.swipe-item img {
  width: 80%;
  height: auto;
  border-radius: 12px;
}
.swipe-item .txt {
  font-size: 16px;
  font-weight: bold;
  color: #333;
}
.dots {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 18px;
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #ddd;
  cursor: pointer;
}
.dot.active {
  background: #ff5722;
}
</style>

<div class="swipe-container">
  <div class="swipe-wrapper">
    <div class="swipe-slide" id="slide">

      <div class="swipe-item">
        <img src="iphone.jpg">
        <div class="txt">手机</div>
      </div>

      <div class="swipe-item">
        <img src="coin10.jpg">
        <div class="txt">10金币</div>
      </div>

      <div class="swipe-item">
        <img src="coin5.jpg">
        <div class="txt">5金币</div>
      </div>

      <div class="swipe-item">
        <img src="shirt.jpg">
        <div class="txt">T恤</div>
      </div>

      <div class="swipe-item">
        <img src="hat.jpg">
        <div class="txt">帽子</div>
      </div>



      <div class="swipe-item">
        <img src="coin1.jpg">
        <div class="txt">1金币</div>
      </div>



    </div>
  </div>
  <div class="dots" id="dots"></div>
</div>

<script>
const slide = document.getElementById('slide');
const dotsBox = document.getElementById('dots');
const items = document.querySelectorAll('.swipe-item');
let current = 0;
const total = items.length;

for(let i=0; i<total; i++){
  const d = document.createElement('div');
  d.className = 'dot';
  d.onclick = () => { current = i; update(); }
  dotsBox.appendChild(d);
}
const dots = document.querySelectorAll('.dot');

function update(){
  slide.style.transform = `translateX(-${current * 100}%)`;
  dots.forEach((o,i) => o.classList.toggle('active', i===current));
}

let startX = 0;
slide.addEventListener('touchstart', e=> startX = e.touches[0].clientX);
slide.addEventListener('touchend', e=> {
  const move = e.changedTouches[0].clientX - startX;
  if(move > 50 && current > 0) current--;
  if(move < -50 && current < total-1) current++;
  update();
});

update();
</script>


</div>


 <button class="draw-btn" onclick="startDraw()">开始抽奖</button>
  
 
  
  <div class="result" id="result"></div>
</div>

<script>
  


if(localStorage.getItem("hasDraw")){

   localStorage.setItem("hasDraw", "false");
   document.querySelector(".draw-btn").disabled = false;
   document.querySelector(".draw-btn").innerText = "抽奖";
  
 // document.querySelector(".draw-btn").disabled = true;
//  document.querySelector(".draw-btn").innerText = "您已抽过奖，每人仅限一次";
}

function startDraw() {
  
  if(localStorage.getItem("hasDraw")){
   // alert("每人仅限抽奖一次！");
   // return;
 }

  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let email = document.getElementById("email").value.trim();



  // ====================== 600奖池，无iPhone ======================
  let prizePool = [
    ...Array(500).fill("1U"),
    ...Array(50).fill("5U"),
    ...Array(10).fill("10U"),
    ...Array(20).fill("T恤"),
    ...Array(20).fill("帽子")
    ...Array(10).fill("500U保证金")
  ];
  // ==============================================================

  let winPrize = prizePool[Math.floor(Math.random() * prizePool.length)];
  document.getElementById("result").innerText = "恭喜您中奖：" + winPrize;

  localStorage.setItem("hasDraw", "true");
  document.querySelector(".draw-btn").disabled = true;
  document.querySelector(".draw-btn").innerText = "已抽奖（每人一次）";

   document.getElementById("prizeResult").value = winPrize;

fetch('/api/log', {
  method: 'POST',
  body: new FormData(document.forms[0])
});
  
}
</script>
</body>
</html>
